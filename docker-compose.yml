services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # Not published to the host on purpose: the server reaches MongoDB over the
    # internal compose network (mongodb://mongo:27017), so `docker compose up`
    # never collides with a MongoDB already running on your machine.
    # To inspect the database directly: `docker compose exec mongo mongosh`.
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      DB_NAME: dayby
      LLM_PROVIDER: mock
      STT_PROVIDER: mock
      APP_ENV: development
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      # Live reload during development (app code is bind-mounted over the image copy).
      - ./server:/app

volumes:
  mongo-data:
