services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # A single-node replica set, not a standalone: change streams (which power the
    # live family sync) are only supported on a replica set. One node is enough --
    # this is about the oplog, not about redundancy.
    command: ["--replSet", "rs0", "--bind_ip_all"]
    # Not published to the host on purpose: the server reaches MongoDB over the
    # internal compose network (mongodb://mongo:27017), so `docker compose up`
    # never collides with a MongoDB already running on your machine.
    # To inspect the database directly: `docker compose exec mongo mongosh`.
    volumes:
      - mongo-data:/data/db
    # Doubles as the one-time replica set initiation: rs.status() throws until the
    # set exists, and the catch initiates it. Healthy therefore means "ready to
    # serve change streams", which is exactly what the server waits for.
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "try { rs.status().ok } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }).ok }"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 20s

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      DB_NAME: dayby
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      STT_PROVIDER: ${STT_PROVIDER:-mock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.6-flash}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-false}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-none}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-not-for-production-generate-a-real-one}
      APP_ENV: development
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      # Live reload during development (app code is bind-mounted over the image copy).
      - ./server:/app

volumes:
  mongo-data:
